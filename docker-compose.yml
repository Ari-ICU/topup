services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: topup_db
    ports:
      - "5050:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes # enable persistence

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/topup_db?schema=public
      - PORT=4000
      - NODE_ENV=development
      - BAKONG_ACCOUNT_ID=thoeurnratha@devb
      - BAKONG_MERCHANT_NAME=TopUpPay Sandbox
      - BAKONG_MERCHANT_CITY=Phnom Penh
      - BAKONG_ACQUIRING_BANK=ABA Bank
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      # Named volume so the container's node_modules (with ioredis etc.)
      # take priority over the host bind-mount, preventing missing-package errors.
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Browser-side (user's machine → host:4000)
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      # Server-side (Next.js container → backend container via Docker network)
      - BACKEND_API_URL=http://backend:4000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
