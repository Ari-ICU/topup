services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5050:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes # enable persistence

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    command: npm run dev
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      - PORT=4000
      - NODE_ENV=development
      - BAKONG_ACCOUNT_ID=${BAKONG_ACCOUNT_ID}
      - BAKONG_MERCHANT_NAME=${BAKONG_MERCHANT_NAME}
      - BAKONG_MERCHANT_CITY=${BAKONG_MERCHANT_CITY}
      - BAKONG_ACQUIRING_BANK=${BAKONG_ACQUIRING_BANK}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      # Named volume so the container's node_modules (with ioredis etc.)
      # take priority over the host bind-mount, preventing missing-package errors.
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Browser-side
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      # Server-side
      - BACKEND_API_URL=${BACKEND_API_URL}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
