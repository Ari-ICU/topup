worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ─── Nginx Real IP (Trusting the Tunnel) ──────────────────────
    set_real_ip_from  172.16.0.0/12; # Trust internal Docker networks
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ─── Performance ──────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ─── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Rate Limiting ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ─── Security Headers ─────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Main Server ──────────────────────────────────────────────
    server {
        listen 80;
        
        # Use Docker's internal DNS resolver
        resolver 127.0.0.11 valid=30s;
        
        # ── API proxy ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            set $backend_host backend;
            proxy_pass http://$backend_host:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Uploads proxy (Images) ────────────────────────────────
        location /uploads/ {
            set $backend_uploads backend;
            proxy_pass http://$backend_uploads:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # ── Next.js frontend ──────────────────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;

            set $frontend_host frontend;
            proxy_pass http://$frontend_host:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Static files cache ───────────────────────────────────
        location /_next/static/ {
            set $frontend_static frontend;
            proxy_pass http://$frontend_static:3000;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Error pages ──────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
