services:
  # ─────────────────────────────────────────────────────────────────
  #  Backend API (Express + Prisma)
  # ─────────────────────────────────────────────────────────────────
  - type: web
    name: topup-backend
    env: node
    rootDir: backend
    # Only rebuild if files inside the backend/ directory change
    buildFilter:
      ignoredPaths:
        - frontend/**
        - docs/**
        - nginx/**
    plan: free # 🎁 Free for testing
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: topup-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: BAKONG_ACCOUNT_ID
        sync: false
      - key: BAKONG_MERCHANT_NAME
        value: "TopUpPay"
      - key: MOOGOLD_TEST_MODE
        value: "true" # 🧪 Testing mode enabled by default for free tier
      - key: MOOGOLD_TEST_OUTCOME
        value: "success"

databases:
  - name: topup-db
    plan: free # 🎁 Free for testing
    databaseName: topup_db
    user: topup_admin
