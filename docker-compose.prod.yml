services:

  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL — Production Database
  # ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # Backend — Express API (production build)
  # ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Bakong KHQR (production credentials from NBC)
      BAKONG_ACCOUNT_ID: ${BAKONG_ACCOUNT_ID}
      BAKONG_MERCHANT_NAME: ${BAKONG_MERCHANT_NAME}
      BAKONG_MERCHANT_CITY: ${BAKONG_MERCHANT_CITY}
      BAKONG_ACQUIRING_BANK: ${BAKONG_ACQUIRING_BANK}
      # Top-up provider
      TOPUP_PROVIDER_URL: ${TOPUP_PROVIDER_URL}
      TOPUP_PROVIDER_KEY: ${TOPUP_PROVIDER_KEY}
      TOPUP_PROVIDER_SECRET: ${TOPUP_PROVIDER_SECRET}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────────
  # Frontend — Next.js (production build)
  # ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy + SSL Termination
  # ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # SSL certs from Let's Encrypt
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
